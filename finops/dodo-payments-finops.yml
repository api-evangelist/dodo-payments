description: >-
  FinOps view of Dodo Payments merchant-of-record (MoR) cost of acceptance.
  Dodo deducts a percentage-plus-fixed fee per transaction with additive
  surcharges for international payments, subscriptions, and certain payment
  methods, then settles the net to the merchant. Refunds ($1), disputes
  ($30), and small/SWIFT payouts carry flat fees. Because Dodo is the seller
  of record, it also collects and remits global sales tax / VAT / GST, which
  is passed through rather than retained by the merchant.
notes: >-
  MoR fees are netted out of settlement, not invoiced monthly; reconcile
  actual fees against the per-payout breakup (and breakup CSV) from the
  Payouts API. Verify current rates on the Dodo Payments pricing page.
