meters:
- name: transaction_volume
  description: Gross transaction amount processed, billed at the base percentage rate.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - currency
  - geo
- name: transaction_count
  description: Number of transactions, billed at the fixed per-transaction fee.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - product_type
- name: international_surcharge
  description: Additive 1.5% surcharge on payments outside the domestic region.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - geo
- name: subscription_surcharge
  description: Additive 0.5% surcharge applied to recurring subscription transactions.
  unit: currency
  aggregation: sum
  dimensions:
  - account
- name: payment_method_surcharge
  description: Additive surcharge for BNPL and PayPal payment methods (+3%).
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - payment_method
- name: refund_fees
  description: Flat $1 fee per refund issued.
  unit: refunds
  aggregation: sum
  dimensions:
  - account
- name: dispute_fees
  description: Flat $30 fee per dispute / chargeback.
  unit: disputes
  aggregation: sum
  dimensions:
  - account
- name: payout_fees
  description: Payout fees ($5 under $1,000; $25 USD SWIFT) deducted at settlement.
  unit: payouts
  aggregation: sum
  dimensions:
  - account
  - payout_method
- name: usage_billing_events
  description: Metered usage events ingested, billed at $1 per 1M events.
  unit: events
  aggregation: sum
  dimensions:
  - account
  - meter
- name: tax_collected_remitted
  description: Sales tax / VAT / GST collected and remitted by Dodo as merchant of record (pass-through).
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - jurisdiction
principles:
- name: Visibility
  description: Pull the per-payout breakup and breakup CSV from the Payouts API to see gross sales, fees, taxes, and net settlement per period.
- name: Allocation
  description: Tag payments and subscriptions with metadata (team, product, workload) and map settlement fees back to those cost centers.
- name: Optimization
  description: Steer customers toward lower-surcharge payment methods where appropriate, batch payouts above the $1,000 threshold to avoid the small-payout fee, and reduce disputes/refunds to cut flat fees.
- name: Accountability
  description: Review effective take rate (total fees / gross volume) monthly against forecast and assign owners per product line.
