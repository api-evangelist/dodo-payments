sources:
  - url: https://docs.dodopayments.com/api-reference/introduction
    type: APIReference
    note: Documents REST base URLs (live/test) and Bearer API key auth; no WebSocket mentioned.
  - url: https://docs.dodopayments.com/api-reference/webhooks
    type: APIReference
    note: Events are delivered via outbound HTTP webhooks with a signing secret, not WebSocket or SSE.
  - url: https://dodopayments.com/pricing
    type: Documentation
    note: Confirms merchant-of-record fee model; no realtime streaming surface described.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE protocol surface exists; the asynchronous event
    surface is outbound HTTP webhooks modeled within the REST API. No
    AsyncAPI artifact was authored. apis.yml documents the nine REST API
    surfaces (Products, Payments, Subscriptions, Customers, Checkout
    Sessions, Discounts, Licenses, Payouts, Webhooks).
