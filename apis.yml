aid: dodo-payments
url: https://raw.githubusercontent.com/api-evangelist/dodo-payments/refs/heads/main/apis.yml
name: Dodo Payments
kind: company
description: Dodo Payments is a merchant-of-record (MoR) payments platform for global
  digital businesses. Its REST API handles one-time payments, subscriptions, checkout
  sessions, customers, products, discounts, license keys, payouts, refunds, disputes,
  and webhooks, while Dodo acts as the seller of record and calculates, collects,
  and remits sales tax, VAT, and GST across 190+ jurisdictions.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Payments
- Merchant of Record
- Subscriptions
- Billing
- Global Commerce
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
